<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela_de_Inscriçao</title>
    <link rel="stylesheet" href="tela_de_cadastro.css">
</head>
<body>
    
    <div>
        <a id="titulo_inscriçao_link" href="/Home/index.html">
        
            <h1 id="titulo_inscriçao">
                MyWatchList
            </h1>
    
        </a>
    </div>

    <div id="inscriçao" class="inscriçao">
       <ul id="ul">
            <li>
                <p id="Nome">Nome</p>
                <input id="nome" type="text" placeholder="Insira o seu nome">
            </li>
           
            <li>
                <p>Apelido (Nick Name) </p>
                <input id="apelido" type="text" placeholder="Insira um apelido">
            </li>

            <li>
                <p>Email</p>
                <input id="email" type="email" placeholder="Insira o seu Email">
            </li>
            
            <li>
                <p>Data de Nascimento</p>
                <input id="idade" type="date" placeholder="Insira o seu aniversario">
            </li>

            <li>
                <p>Escolha a sua senha</p>
                <input id="senha" type="password" placeholder="Insra a sua senha">
            </li>

            <li>
                <button type="button" id="botao_confirmar">Confirmar</button>            </li>
       </ul>
    </div>
</body>
</html>
